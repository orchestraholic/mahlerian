<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mahlerian</title>
<style>

  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    min-height: 100%;
    color: #1c1810;
    background-color: #f7f4ee;
    background-image:
      radial-gradient(rgba(28,24,16,0.025) 1px, transparent 1px);
    background-size: 4px 4px;
  }
  body { display: flex; flex-direction: column; align-items: center; }
  a { color: inherit; }

  header { width: 100%; max-width: 1040px; padding: 52px 24px 0; text-align: center; }
  header a.brand { text-decoration: none; }
  h1 { font-family: 'Fraunces', serif; font-optical-sizing: auto; font-weight: 500; letter-spacing: -0.01em; font-size: clamp(2.2rem, 6vw, 3.6rem); color: #1c1810; }

  .flourish { width: 100%; max-width: 1040px; height: 1px; background: rgba(28,24,16,0.12); margin-top: 24px; }

  nav.tabs { width: 100%; max-width: 1040px; margin-top: 36px; padding: 0 24px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
  nav.tabs a {
    font-family: 'Inter', sans-serif; font-weight: 600; font-size: 0.85rem; letter-spacing: 0.06em;
    text-align: center; color: #1c1810; text-decoration: none; padding: 16px 8px;
    background: #fbf9f4;
    border: 1px solid rgba(28, 24, 16, 0.15);
    border-radius: 3px;
    box-shadow: 0 1px 0 rgba(28,24,16,0.04);
    transition: background 0.2s ease, border-color 0.2s ease, color 0.2s ease, transform 0.15s ease;
  }
  nav.tabs a:hover, nav.tabs a:focus-visible { background: #1c1810; border-color: #1c1810; color: #f7f4ee; transform: translateY(-1px); }
  nav.tabs a.active { background: #1c1810; border-color: #1c1810; color: #f7f4ee; }

  @media (max-width: 720px) {
    nav.tabs { grid-template-columns: repeat(2, 1fr); }
  }

  main { width: 100%; max-width: 720px; margin: 56px auto 60px; padding: 0 24px; }
  main h2 { font-family: 'Fraunces', serif; font-weight: 500; font-size: 1.6rem; margin-bottom: 8px; }
  main .eyebrow { display: block; font-family: 'Inter', sans-serif; font-weight: 600; font-size: 0.7rem; letter-spacing: 0.18em; text-transform: uppercase; color: #b08a4e; margin-bottom: 10px; }
  main ul { list-style: none; margin-top: 22px; }
  main li { border-bottom: 1px solid rgba(28, 24, 16, 0.1); }
  main a.post { display: block; padding: 18px 4px; text-decoration: none; border-left: 2px solid transparent; padding-left: 14px; margin-left: -16px; transition: border-color 0.2s ease, background 0.2s ease; }
  main li:first-child a.post { padding-top: 18px; }
  main a.post:hover { border-left-color: #b08a4e; background: rgba(176,138,78,0.05); }
  main a.post:hover .post-title { color: #1c1810; }
  main .post-title { display: block; font-family: 'Fraunces', serif; font-size: 1.1rem; font-weight: 500; color: #1c1810; }
  main .post-meta { display: block; margin-top: 4px; font-family: 'Inter', sans-serif; font-size: 0.78rem; color: #8a8174; }

  footer {
    width: 100%;
    max-width: 1040px;
    padding: 28px 24px 56px;
    text-align: center;
    border-top: 1px solid rgba(28, 24, 16, 0.1);
  }
  footer p {
    font-family: 'Inter', sans-serif;
    font-size: 0.72rem;
    letter-spacing: 0.08em;
    color: #a89e8d;
  }

  /* ---------- Photos: side by side, matched height, framed ---------- */
  .photos {
    width: 100%;
    max-width: 1040px;
    margin-top: 44px;
    padding: 0 24px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 20px;
  }
  .photos figure { width: 100%; }
  .photos .frame {
    padding: 8px;
    background: #fbf9f4;
    border: 1px solid rgba(28, 24, 16, 0.12);
    box-shadow: 0 6px 16px rgba(28, 24, 16, 0.08);
  }
  .photos img { width: 100%; height: 260px; display: block; object-fit: cover; }
  .photos figure.wide { grid-column: 1 / -1; }
  .photos figure.wide img { height: 380px; }
  .photos figcaption {
    margin-top: 10px;
    font-family: 'Inter', sans-serif;
    font-size: 0.66rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: #8a8174;
    text-align: center;
  }
  @media (max-width: 600px) {
    .photos img { height: 200px; }
    .photos figure.wide img { height: 220px; }
  }

  /* ---------- Quote: centered below photos ---------- */
  .quote-block { width: 100%; max-width: 720px; margin: 48px auto 0; padding: 0 24px; text-align: center; position: relative; }
  .quote-mark {
    font-family: 'Fraunces', serif;
    font-size: 3.2rem;
    line-height: 1;
    color: rgba(176,138,78,0.35);
    display: block;
    margin-bottom: -8px;
  }
  blockquote { font-family: 'Fraunces', serif; font-weight: 400; font-style: italic; font-size: clamp(1.3rem, 2.6vw, 1.9rem); line-height: 1.45; color: #2a241c; }
  cite { display: block; margin-top: 16px; font-family: 'Inter', sans-serif; font-style: normal; font-weight: 500; font-size: 0.78rem; letter-spacing: 0.1em; text-transform: uppercase; color: #8a8174; }
  cite::before { content: '—'; margin-right: 6px; color: #b08a4e; }

  /* ---------- Recently ---------- */
  .recent { width: 100%; max-width: 720px; margin: 64px auto 24px; padding: 0 24px; }
  .intro { width: 100%; max-width: 720px; margin: 48px auto 0; padding: 0 24px; }
  .intro p { font-family: 'Inter', sans-serif; font-size: 1rem; line-height: 1.75; color: #3a3228; margin-bottom: 16px; }
  .intro p.find-me { font-family: 'Inter', sans-serif; font-size: 0.78rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: #b08a4e; margin-bottom: 8px; }
  .intro p.links { font-size: 0.88rem; color: #8a8174; }
  .intro p.links span { color: #3a3228; }
  .intro p.links a { color: #b08a4e; text-decoration: none; }
  .intro p.links a:hover { text-decoration: underline; }
  .intro p.closing { font-family: 'Fraunces', serif; font-style: italic; font-size: 1.05rem; color: #1c1810; margin-top: 24px; }
  .recent .label { font-family: 'Inter', sans-serif; font-weight: 600; font-size: 0.72rem; letter-spacing: 0.16em; text-transform: uppercase; color: #b08a4e; display: block; margin-bottom: 18px; }
  .recent ul { list-style: none; }
  .recent li { border-bottom: 1px solid rgba(28, 24, 16, 0.1); }
  .recent a.post { display: block; padding: 16px 4px; text-decoration: none; border-left: 2px solid transparent; padding-left: 14px; margin-left: -16px; transition: border-color 0.2s ease, background 0.2s ease; }
  .recent li:first-child a.post { padding-top: 0; padding-left: 14px; }
  .recent a.post:hover { border-left-color: #b08a4e; background: rgba(176,138,78,0.05); }
  .recent .post-title { display: block; font-family: 'Fraunces', serif; font-size: 1.05rem; font-weight: 500; color: #1c1810; }
  .recent .post-meta { display: block; margin-top: 4px; font-family: 'Inter', sans-serif; font-size: 0.75rem; color: #8a8174; }

  @media (max-width: 600px) {
    .photos img { height: 200px; }
  }
</style>
</head>
<body>

  <header>
    <a class="brand" href="index.html"><h1>Mahlerian</h1></a>
  </header>

  <div class="flourish"></div>

  <nav class="tabs">
    <a href="reviews.html">Concert Reviews</a>
    <a href="albums.html">Albums</a>
    <a href="discussions.html">Discussions</a>
    <a href="more.html">More</a>
  </nav>

  <section class="photos">
    <figure>
      <div class="frame">
        <img src="images/busan-mahler8.jpg" alt="Busan Philharmonic Orchestra — Mahler Symphony No. 8">
      </div>
      <figcaption>Busan Philharmonic Orchestra, cond. Hong Suk-won — Mahler Symphony No. 8 · June 2026</figcaption>
    </figure>
    <figure>
      <div class="frame">
        <img src="images/seoul-mahler2.jpg" alt="Seoul Philharmonic Orchestra — Mahler Symphony No. 2">
      </div>
      <figcaption>Seoul Philharmonic Orchestra, cond. Jaap van Zweden — Mahler Symphony No. 2 · January 2025</figcaption>
    </figure>
  </section>

  <section class="intro">
    <p class="find-me">Find me here</p>
    <p class="links">Discord: <span>jaelalala</span> · <a href="https://www.reddit.com/user/No-Pair-8650/" target="_blank">Reddit</a> · <a href="mailto:orchestraholic@gmail.com">orchestraholic@gmail.com</a></p>
  </section>

  <footer>
    <p>MAHLERIAN — A HOME FOR LISTENING, CLOSELY</p>
  </footer>

</body>
</html>
